groups:
  - name: blackbox-homelab-alerts
    rules:
      - alert: HomelabServiceDown
        expr: probe_success{job="blackbox-homelab-https"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "{{ $labels.instance }} is unreachable"
          description: "HTTP probe to {{ $labels.instance }} has failed for over 2 minutes."

      - alert: HomelabServiceSlowResponse
        expr: probe_duration_seconds{job="blackbox-homelab-https"} > 3
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "{{ $labels.instance }} responding slowly"
          description: "Probe duration is {{ $value | printf \"%.2f\" }}s, over the 3s threshold, for 10+ minutes."

      - alert: HomelabTLSCertExpiringSoon
        expr: (probe_ssl_earliest_cert_expiry{job="blackbox-homelab-https"} - time()) / 86400 < 30
        for: 1h
        labels:
          severity: warning
        annotations:
          summary: "TLS cert for {{ $labels.instance }} expiring soon"
          description: "Certificate expires in {{ $value | printf \"%.0f\" }} days. Regenerate via the homelab-k3s README's cert regeneration steps."

      - alert: HomelabTLSCertExpiringCritical
        expr: (probe_ssl_earliest_cert_expiry{job="blackbox-homelab-https"} - time()) / 86400 < 7
        for: 1h
        labels:
          severity: critical
        annotations:
          summary: "TLS cert for {{ $labels.instance }} expires within a week"
          description: "Certificate expires in {{ $value | printf \"%.1f\" }} days. Regenerate now."

      - alert: BlackboxExporterDown
        expr: up{job="blackbox-homelab-https"} == 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "blackbox_exporter itself unreachable"
          description: "Prometheus cannot reach blackbox_exporter on localhost:9115 - all HTTP/TLS probing is blind."
