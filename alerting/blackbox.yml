modules:
  https_homelab:
    prober: http
    timeout: 5s
    http:
      method: GET
      valid_http_versions: ["HTTP/1.1", "HTTP/2.0"]
      valid_status_codes: [200, 301, 302, 307, 308, 401, 403]
      tls_config:
        insecure_skip_verify: true
      preferred_ip_protocol: "ip4"

  http_2xx:
    prober: http
    timeout: 5s
    http:
      valid_http_versions: ["HTTP/1.1", "HTTP/2.0"]
      preferred_ip_protocol: "ip4"

  # DNS probe: checks that Pi-hole resolves .homelab.local names.
  # Target in prometheus.yml must be the DNS server (127.0.0.1:53).
  dns_pihole_homelab:
    prober: dns
    timeout: 5s
    dns:
      query_name: "argocd.homelab.local"
      query_type: "A"
      transport_protocol: "udp"
      preferred_ip_protocol: "ip4"
